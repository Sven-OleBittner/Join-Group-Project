  <body
    onload="
      initBoardSite();
      initSite();
    "
    onclick=" closeAllOptionsOnclick()"
  >
    <dialog
      class="addTaskDialog"
      id="addTaskDialog"
      onclick="closeAddTaskModal()"
    >
      <div
        onclick="event.stopPropagation()"
        id="addTaskDialogContent"
        class="addTaskDialogContent"
      ></div>
    </dialog>

    <div class="sidebar">
      <div class="frame">
        <div class="capa2">
          <img
            class="logo-img"
            src="./assets/icons/Join_logo 2.svg"
            alt="Join"
          />
        </div>
      </div>
      <div class="nav-container">
        <ul class="nav-menu">
          <li>
            <button class="nav-item" onclick="goToPage('./summary.html')">
              <span class="icon"
                ><img src="./assets/img/summary_sidebar.svg" alt="Summary"
              /></span>
              <span class="text">Summary</span>
            </button>
          </li>
          <li>
            <button class="nav-item" onclick="goToPage('./add_task.html')">
              <span class="icon"
                ><img
                  src="./assets/img/sidebar_add_task_icon.svg"
                  alt="Add Task"
              /></span>
              <span class="text">Add Task</span>
            </button>
          </li>
          <li>
            <button class="nav-item active" onclick="goToPage('./board.html')">
              <span class="icon"
                ><img src="./assets/img/sidebar_board_icon.svg" alt="Board"
              /></span>
              <span class="text">Board</span>
            </button>
          </li>
          <li>
            <button class="nav-item" onclick="goToPage('./contacts.html')">
              <span class="icon"
                ><img
                  src="./assets/img/sidebar_contact_calendar_icon.svg"
                  alt="Contacts"
              /></span>
              <span class="text">Contacts</span>
            </button>
          </li>
        </ul>
      </div>
      <div class="bottom-links">
        <a href="./privacy_policy.html" class="bottom-link">Privacy Policy</a>
        <a href="./legal_notice.html" class="bottom-link">Legal notice</a>
      </div>
    </div>

    <div class="headercontainer">
      <header class="header">
        <div class="header-left">
          <img src="./assets/img/Capa 2.svg" alt="Logo" class="header-logo" />
        </div>
        <div class="title-container">
          <p class="title">Kanban Project Management Tool</p>
        </div>
        <div class="header-right">
          <div onclick="goToPage('./help.html')" class="help-icon">?</div>
          <div
            onclick="showLogOutMenu()"
            id="userInitials"
            class="user-avatar"
          ></div>
        </div>
      </header>

      <div class="main-content">
        <section class="kb">
          <div class="kb-toolbar">
            <h1 class="kb-title">Board</h1>
            <div class="kb-actions">
              <div class="kb-search">
                <input
                  type="text"
                  placeholder="Find Task"
                  aria-label="Find Task"
                />
                <img
                  class="kb-icon"
                  src="./assets/img/board_input_search_icon.svg"
                  alt="Search"
                />
              </div>
              <button
                id="addTaskBoard"
                onclick="
                  chooseAddTaskSite('addTaskBoard');
                  loadContactsForDropdown();
                "
                class="kb-add-btn"
                type="button"
              >
                <span class="kb-addTask">Add task</span>
                <span class="kb-plus">+</span>
              </button>
            </div>
          </div>

          <div class="kb-columns">
            <!-- To do -->
            <section
              ondrop="moveTo('toDoTaskList')"
              ondragover="dragoverHandler(event)"
              id="addTaskBoardToDo"
              class="kb-col"
              aria-label="To do"
              data-status="todo"
            >
              <header class="kb-col-head">
                <h2 class="kb-col-title">To do</h2>
                <button
                  onclick="
                    chooseAddTaskSite('addTaskBoardToDo');
                    loadContactsForDropdown();
                  "
                  class="kb-col-add"
                  type="button"
                  aria-label="Add task to To do"
                ></button>
              </header>
              <div id="toDoTaskList" class="kb-card-list" data-cards></div>
              <div id="emptyToDo" class="kb-empty">
                <span>No tasks To do</span>
              </div>
            </section>

            <!-- In progress -->
            <section
              ondrop="moveTo('inProgressTaskList')"
              ondragover="dragoverHandler(event)"
              id="addTaskBoardInProgress"
              class="kb-col"
              aria-label="In progress"
              data-status="inprogress"
            >
              <header class="kb-col-head">
                <h2 class="kb-col-title">In progress</h2>
                <button
                  onclick="
                    chooseAddTaskSite('addTaskBoardInProgress');
                    loadContactsForDropdown();
                  "
                  class="kb-col-add"
                  type="button"
                  aria-label="Add task to In progress"
                ></button>
              </header>
              <div
                id="inProgressTaskList"
                class="kb-card-list"
                data-cards
              ></div>
              <div id="emptyInProgress" class="kb-empty">
                <span>No tasks In progress</span>
              </div>
            </section>

            <!-- Await feedback -->
            <section
              ondrop="moveTo('awaitFeedbackTaskList')"
              ondragover="dragoverHandler(event)"
              id="addTaskBoardAwaitFeedback"
              class="kb-col"
              aria-label="Await feedback"
              data-status="feedback"
            >
              <header class="kb-col-head">
                <h2 class="kb-col-title">Await feedback</h2>
                <button
                  onclick="
                    chooseAddTaskSite('addTaskBoardAwaitFeedback');
                    loadContactsForDropdown();
                  "
                  class="kb-col-add"
                  type="button"
                  aria-label="Add task to Await feedback"
                ></button>
              </header>
              <div
                id="awaitFeedbackTaskList"
                class="kb-card-list"
                data-cards
              ></div>
              <div id="emptyAwaitFeedback" class="kb-empty">
                <span>No tasks Await feedback</span>
              </div>
            </section>

            <!-- Done -->
            <section
              ondrop="moveTo('doneTaskList')"
              ondragover="dragoverHandler(event)"
              id="addTaskBoardDone"
              class="kb-col"
              aria-label="Done"
              data-status="done"
            >
              <header class="kb-col-head">
                <h2 class="kb-col-title">Done</h2>
              </header>
              <div id="doneTaskList" class="kb-card-list" data-cards></div>
              <div id="emptyDone" class="kb-empty">
                <span>No tasks Done</span>
              </div>
            </section>
          </div>
        </section>
      </div>
    </div>
