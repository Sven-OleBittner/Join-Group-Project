<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/standard.css">
    <title>Logout Menu Template</title>
    <style>
        body {
            background-color: var(--light-grey-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .logout-menu {
            background-color: var(--darkblue-light-color);
            width: 146px;
            border-radius: 20px 0px 20px 20px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .menu-item {
            color: var(--white-color);
            font-size: 16px;
            font-weight: 400;
            padding: 14px 0;
            padding-left: 8px;
            cursor: pointer;
            transition: all 150ms ease-in-out;
            text-decoration: none;
            display: block;
        }

        .menu-item:hover {
            background-color: rgba(41, 171, 226, 0.15);
        }
    </style>
</head>
<body>
    <div class="logout-menu">
        <a href="./legal_notice.html" class="menu-item">Legal Notice</a>
        <a href="./privacy_policy.html" class="menu-item">Privacy Policy</a>
        <a onclick="loggingOutUser()" class="menu-item">Log out</a>
    </div>
    <div class="logout-menu">
        <a href="./help.html" class="menu-item">Help</a>
        <a href="./legal_notice.html" class="menu-item">Legal Notice</a>
        <a href="./privacy_policy.html" class="menu-item">Privacy Policy</a>
        <a onclick="loggingOutUser()" class="menu-item">Log out</a>
    </div>
</body>
</html>
